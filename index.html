<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VUGY Mini App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Привет, VUGY! 🔥</h1>

    <button onclick="hello()">
        Нажми меня
    </button>

    <script>
        function hello() {
            alert("Мини-приложение работает!");
        }
    </script>

</body>
</html>
